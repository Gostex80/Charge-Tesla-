<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tesla Charge Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>TESLA CHARGE</h1>

  <div class="card">
    <label>Charge actuelle (%)</label>
    <input type="number" id="current" min="0" max="100">

    <label>Charge cible (%)</label>
    <input type="number" id="target" min="0" max="100">

    <label>Puissance</label>
    <select id="power">
      <option value="3.7">3.7 kW</option>
      <option value="11">11 kW</option>
    </select>

    <button onclick="calculate()">Calculer</button>

    <div id="result">--</div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
